  <link rel="manifest" href="/manifest.json" />

  <!-- Critical inline CSS: sets background/text before the main stylesheet loads,
       preventing the white flash during blocking CSS download (~300ms on slow 4G) -->
  <style>
    html { background: #fafbfc; }
    body { margin: 0; background: #fafbfc; color: #0f172a;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>

  <!-- Preload first hero image to improve LCP -->
  <link rel="preload" as="image" href="/TB.webp" fetchpriority="high" />

  <!--
    Google Fonts — ALL families in ONE request, loaded asynchronously.
    CSS @import inside stylesheets is render-blocking even with display=swap.
    This single <link rel="preload"> trick moves all fonts off the critical path.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap">
  </noscript>

  <!-- Google tag (gtag.js) -->

    gtag('js', new Date());

    gtag('config', 'G-J45HZDCVNQ');
  </script>
